<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>Bloom College Student Registration Form</title>
    <style>
        .email-focus {
            background-color: #e9f7ef;
            transition: background-color 0.3s;
        }
    </style>
  </head>
<body style="background-color: papayawhip;">

<!-- Title -->
  <div class="container mt-5">
    <h1 class="text-center" style="color: palevioletred;">BLOOM COLLEGE</h1>
    <h2 class="text-center">Student Registration Form</h2>
    <form id="registrationForm" class="p-4 border rounded shadow-sm">

<!-- Student image -->
    <form id="registrationForm" class="p-4 border rounded shadow-sm">
            <div class="mb-3 row align-items-center">
                <label for="studentImage" class="col-sm-2 col-form-label">Student image:</label>
                <div class="col-sm-10">
                    <input type="file" class="form-control" id="studentImage" accept="image/*">
                    <small class="form-text text-muted">(less than 5 Mb)</small>
                </div>
            </div>
    
<!-- Student name -->
        <div class="mb-3 row">
    <label for="student name" class="col-sm-2 col-form-label">Student Name:</label>
    <div class="col-sm-10">
      <input type="text" class="form-control" id="student name" placeholder="Full Name">
    </div>
  </div>

<!-- Father's name -->
        <div class="mb-3 row">
    <label for="father's name" class="col-sm-2 col-form-label">Father Name:</label>
    <div class="col-sm-10">
      <input type="text" class="form-control" id="father's name" placeholder="Father's Full Name">
    </div>
  </div>

<!-- Mother's name -->
       <div class="mb-3 row">
    <label for="mother's name" class="col-sm-2 col-form-label">Mother Name:</label>
    <div class="col-sm-10">
      <input type="text" class="form-control" id="mother's name" placeholder="Mother's Full Name">
    </div>
  </div>

<!-- Gender -->
 <div class="mb-3 row">
      <label class="col-sm-2 col-form-label">Gender:</label> 
          <div class="col-sm-10 pt-2">
              <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="genderOptions" id="genderMale" value="Male">
                  <label class="form-check-label" for="genderMale">Male</label>
              </div>
          <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="genderOptions" id="genderFemale" value="Female">
                  <label class="form-check-label" for="genderFemale">Female</label>
                </div>
          </div>
      </div>

<!-- Date of birth -->
 <div class="mb-3 row">
      <label for="dob" class="col-sm-2 col-form-label">Date of Birth:</label>
          <div class="col-sm-10">
              <input type="date" class="form-control" id="dob" name="dob" required>
            </div>
          </div>

<!-- Email -->
   <div class="mb-3 row">
    <label for="student E-mail" class="col-sm-2 col-form-label">E-mail:</label>
    <div class="col-sm-10">
      <input type="text" class="form-control" id="student E-mail" placeholder="email@xyz.com">
    </div>
  </div>

<!-- Level -->
 <div class="mb-3 row">
      <label for="level" class="col-sm-2 col-form-label">Level:</label>
        <div class="col-sm-4">
      <select class="form-select" aria-label="Default select example">
        <option selected>None</option>
        <option value="Phd">Phd</option>
        <option value="diploma">Diploma</option>
        <option value="degree">Degree</option>
        <option value="masters">Masters</option>
    </select>
  </div>
</div>

<!-- Department -->
 <div class="mb-3 row">
      <label for="level" class="col-sm-2 col-form-label">Department:</label>
        <div class="col-sm-4">
      <select class="form-select" aria-label="Default select example">
        <option selected>None</option>
        <option value="computing">Computer Engineering</option>
        <option value="civil">Civil Engineering</option>
        <option value="electrical">Electrical Engineering</option>
        <option value="mechanical">Mechanical Engineering</option>
      </select>
    </div>
  </div>

<!-- Tel No -->
 <div class="mb-3 row">
    <label for="tel no" class="col-sm-2 col-form-label">Tel/Mobile:</label>
    <div class="col-sm-10">
      <input type="text" class="form-control" id="tel no" placeholder="01X-XXX XXXX">
    </div>
  </div>

<!-- Address -->
 <h3 class="text-center">Address</h3>

<!-- State -->
 <div class="mb-3 row">
    <label for="state name" class="col-sm-2 col-form-label">State:</label>
    <div class="col-sm-10">
      <input type="text" class="form-control" id="state" placeholder="State">
    </div>
  </div>

<!-- City -->
 <div class="mb-3 row">
    <label for="city name" class="col-sm-2 col-form-label">City:</label>
    <div class="col-sm-10">
      <input type="text" class="form-control" id="city name" placeholder="City">
    </div>
  </div>

<!-- Postcode -->
 <div class="mb-3 row">
    <label for="postcode no" class="col-sm-2 col-form-label">Postcode:</label>
    <div class="col-sm-10">
      <input type="text" class="form-control" id="postcode no" placeholder="Postcode">
    </div>
  </div>

<!-- Button -->
  <div class="d-flex justify-content-center gap-3">
    <button type="submit" class="btn btn-primary">Register</button>
    <button type="reset" class="btn btn-secondary">Reset</button>
  </div>

<!-- Modal -->
<div class="modal fade" id="successModal" tabindex="-1" aria-labelledby="successModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-success text-white"">
        <h1 class="modal-title fs-5" id="successModalLabel">Submission Successful</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        Your details have been saved!
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
      </form>
    </div>

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script>
        // --- Question b.i, b.ii ---
        function blurEmail(element) {
            element.classList.remove('email-focus');
        }

        function focusEmail(element) {
            element.classList.add('email-focus');
        }
        
        // --- Question b.iii ---
        function toCaps(element) {
            element.value = element.value.toUpperCase();
        }

        // --- Question b.iv ---
        document.getElementById('registrationForm').addEventListener('submit', function(event) {
            event.preventDefault();

            // Create a new Bootstrap Modal object and show it
            const successModal = new bootstrap.Modal(document.getElementById('successModal'));
            successModal.show();
        });
    </script>

    <!-- Option 2: Separate Popper and Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
  
  </body>
</html>
